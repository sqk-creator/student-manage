<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班级详情</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080c18;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  -webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh;
}
.app{width:100%;max-width:430px;background:linear-gradient(180deg,#080c18 0%,#0d1326 100%);min-height:100vh;position:relative;}
.app::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(30,80,180,0.12) 0%,transparent 60%);pointer-events:none;}
.top-bar{display:flex;align-items:center;padding:12px 16px;position:relative;z-index:2;gap:12px;}
.btn-back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;background:rgba(20,40,80,0.4);border:1px solid rgba(50,120,200,0.15);border-radius:50%;color:rgba(150,190,230,0.7);font-size:18px;cursor:pointer;}
.page-title{font-size:18px;font-weight:700;color:#dce6f8;}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 16px;margin-bottom:14px;position:relative;z-index:1;}
.stat-card{background:linear-gradient(160deg,rgba(14,24,52,0.85),rgba(18,32,62,0.75));border:1px solid rgba(50,120,200,0.1);border-radius:10px;padding:12px 8px;text-align:center;}
.stat-card .val{font-size:18px;font-weight:700;color:#c8ddf8;display:block;}
.stat-card .lbl{font-size:10px;color:rgba(120,155,200,0.45);margin-top:3px;display:block;}

.tabs{display:flex;margin:0 16px 12px;background:rgba(14,24,52,0.6);border-radius:10px;overflow:hidden;border:1px solid rgba(50,120,200,0.1);position:relative;z-index:1;}
.tab-btn{flex:1;padding:10px;text-align:center;border:none;background:transparent;font-size:13px;color:rgba(150,180,220,0.5);cursor:pointer;transition:all .2s;}
.tab-btn.active{color:#5ca0ff;background:rgba(40,100,200,0.15);font-weight:600;}

.content{padding:0 16px 100px;position:relative;z-index:1;}
.item-card{background:linear-gradient(160deg,rgba(14,24,52,0.9),rgba(18,32,62,0.85));border:1px solid rgba(50,120,200,0.1);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;}
.item-card:active{border-color:rgba(70,150,240,0.25);}
.item-info{display:flex;flex-direction:column;gap:3px;}
.item-name{font-size:15px;font-weight:600;color:#dce6f8;}
.item-meta{font-size:11px;color:rgba(120,155,200,0.45);}
.item-right{display:flex;align-items:center;gap:8px;}
.item-tag{font-size:10px;padding:3px 8px;border-radius:8px;}
.item-tag.blue{background:rgba(30,80,200,0.2);color:rgba(120,180,255,0.7);}
.item-arrow{color:rgba(100,140,200,0.35);font-size:16px;}
.empty{text-align:center;color:rgba(120,155,200,0.35);margin-top:60px;font-size:14px;}

.bottom-tab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(180deg,rgba(10,16,32,0.96),rgba(6,10,24,0.98));border-top:1px solid rgba(40,100,180,0.12);display:flex;justify-content:space-around;align-items:center;padding:8px 0 12px;backdrop-filter:blur(20px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.4);}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 20px;position:relative;text-decoration:none;}
.tab-icon svg{width:22px;height:22px;}
.tab-label{font-size:11px;font-weight:500;color:rgba(120,150,190,0.5);}
.tab-item.active .tab-label{color:#5ca0ff;}
.tab-item.active .tab-icon svg{stroke:#5ca0ff;fill:rgba(92,160,255,0.15);}
.tab-badge{position:absolute;top:-2px;right:10px;min-width:18px;height:18px;background:linear-gradient(135deg,#ff3b5c,#ff1744);color:#fff;font-size:10px;font-weight:700;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 0 10px rgba(255,50,70,0.5);}
@media(min-width:431px){.app{border-left:1px solid rgba(40,100,180,0.1);border-right:1px solid rgba(40,100,180,0.1);}}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <button class="btn-back" onclick="history.back()">&#8249;</button>
    <span class="page-title" id="className">班级详情</span>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><span class="val" id="sTotal">-</span><span class="lbl">学生人数</span></div>
    <div class="stat-card"><span class="val" id="sAttend">-</span><span class="lbl">日出勤率</span></div>
    <div class="stat-card"><span class="val" id="sExercise">-</span><span class="lbl">日出操率</span></div>
    <div class="stat-card"><span class="val" id="sAvg">-</span><span class="lbl">均分</span></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('students',this)">学生列表</button>
    <button class="tab-btn" onclick="switchTab('exams',this)">考试记录</button>
  </div>
  <div class="content" id="contentArea"></div>
  <div class="bottom-tab">
    <a class="tab-item active" href="/班级组织首页.html">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none" opacity="0.3"><rect x="4" y="4" width="16" height="16" rx="4"/></svg></div>
      <span class="tab-label">班级组织</span>
    </a>
    <a class="tab-item" href="#"><span class="tab-badge">5</span>
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(120,150,190,0.4)" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      <span class="tab-label">工作台</span>
    </a>
    <a class="tab-item" href="#">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(120,150,190,0.4)" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-8 8-8s8 4 8 8"/></svg></div>
      <span class="tab-label">我的</span>
    </a>
  </div>
</div>
<script>
const params=new URLSearchParams(location.search);
const id=params.get('id')||'1';
const data={
  '1':{name:'高三1班',tag:'文科班',total:50,attend:'100%',exercise:'100%',avg:87.5,
    students:[{id:1,name:'张明宇',no:'2024001',gender:'男'},{id:2,name:'李思雨',no:'2024002',gender:'女'},{id:3,name:'王浩然',no:'2024003',gender:'男'},{id:4,name:'赵晓萌',no:'2024004',gender:'女'}],
    exams:[{id:1,name:'期中考试',subject:'数学',date:'2024-10-15',avg:88.5,total:50},{id:2,name:'期中考试',subject:'语文',date:'2024-10-16',avg:86.0,total:50},{id:3,name:'月考',subject:'英语',date:'2024-09-25',avg:82.3,total:50}]
  },
  '2':{name:'高三2班',tag:'文科班',total:48,attend:'100%',exercise:'100%',avg:85.2,
    students:[{id:5,name:'陈子轩',no:'2024005',gender:'男'},{id:6,name:'刘佳琪',no:'2024006',gender:'女'},{id:7,name:'周博文',no:'2024007',gender:'男'},{id:8,name:'吴雨桐',no:'2024008',gender:'女'}],
    exams:[{id:3,name:'月考',subject:'英语',date:'2024-09-25',avg:80.5,total:48},{id:4,name:'期中考试',subject:'数学',date:'2024-10-15',avg:83.0,total:48}]
  }
};
const d=data[id]||data['1'];
document.getElementById('className').textContent=d.name;
document.getElementById('sTotal').textContent=d.total+'人';
document.getElementById('sAttend').textContent=d.attend;
document.getElementById('sExercise').textContent=d.exercise;
document.getElementById('sAvg').textContent=d.avg;

let currentTab='students';
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function render(){
  const el=document.getElementById('contentArea');
  if(currentTab==='students'){
    if(!d.students.length){el.innerHTML='<div class="empty">暂无学生</div>';return;}
    el.innerHTML=d.students.map(s=>`<div class="item-card" onclick="location.href='m-student-detail.html?id=${s.id}'"><div class="item-info"><span class="item-name">${s.name}</span><span class="item-meta">学号: ${s.no}</span></div><div class="item-right"><span class="item-tag blue">${s.gender}</span><span class="item-arrow">&#8250;</span></div></div>`).join('');
  }else{
    if(!d.exams.length){el.innerHTML='<div class="empty">暂无考试记录</div>';return;}
    el.innerHTML=d.exams.map(e=>`<div class="item-card"><div class="item-info"><span class="item-name">${e.name} - ${e.subject}</span><span class="item-meta">${e.date} · ${e.total}人参考 · 均分 ${e.avg}</span></div><span class="item-arrow">&#8250;</span></div>`).join('');
  }
}
render();
</script>
</body>
</html>
