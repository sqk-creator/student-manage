<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学生详情</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080c18;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  -webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh;
}
.app{width:100%;max-width:430px;background:linear-gradient(180deg,#080c18 0%,#0d1326 100%);min-height:100vh;position:relative;}
.app::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(30,80,180,0.12) 0%,transparent 60%);pointer-events:none;}
.top-bar{display:flex;align-items:center;padding:12px 16px;position:relative;z-index:2;gap:12px;}
.btn-back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;background:rgba(20,40,80,0.4);border:1px solid rgba(50,120,200,0.15);border-radius:50%;color:rgba(150,190,230,0.7);font-size:18px;cursor:pointer;}
.page-title{font-size:18px;font-weight:700;color:#dce6f8;}

.info-card{background:linear-gradient(160deg,rgba(14,24,52,0.9),rgba(18,32,62,0.85));border:1px solid rgba(50,120,200,0.1);border-radius:14px;padding:20px 16px;margin:0 16px 16px;position:relative;z-index:1;}
.info-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(80,160,255,0.18),transparent);}
.info-row{display:flex;padding:10px 0;border-bottom:1px solid rgba(40,80,160,0.08);}
.info-row:last-child{border-bottom:none;}
.info-label{color:rgba(120,155,200,0.45);font-size:13px;width:60px;flex-shrink:0;}
.info-value{color:#c8ddf8;font-size:13px;}

.score-section{margin:0 16px 100px;position:relative;z-index:1;}
.section-title{font-size:17px;font-weight:700;color:#dce6f8;margin-bottom:12px;}
.score-card{background:linear-gradient(160deg,rgba(14,24,52,0.9),rgba(18,32,62,0.85));border:1px solid rgba(50,120,200,0.1);border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.score-left{display:flex;flex-direction:column;gap:2px;}
.score-exam{font-size:14px;color:#dce6f8;font-weight:500;}
.score-meta{font-size:11px;color:rgba(120,155,200,0.45);}
.score-val{font-size:20px;font-weight:700;color:#52c41a;}
.score-val.fail{color:#ff4d4f;}
.empty{text-align:center;color:rgba(120,155,200,0.35);margin-top:40px;font-size:14px;}

.bottom-tab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(180deg,rgba(10,16,32,0.96),rgba(6,10,24,0.98));border-top:1px solid rgba(40,100,180,0.12);display:flex;justify-content:space-around;align-items:center;padding:8px 0 12px;backdrop-filter:blur(20px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.4);}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 20px;position:relative;text-decoration:none;}
.tab-icon svg{width:22px;height:22px;}
.tab-label{font-size:11px;font-weight:500;color:rgba(120,150,190,0.5);}
.tab-item.active .tab-label{color:#5ca0ff;}
.tab-item.active .tab-icon svg{stroke:#5ca0ff;fill:rgba(92,160,255,0.15);}
.tab-badge{position:absolute;top:-2px;right:10px;min-width:18px;height:18px;background:linear-gradient(135deg,#ff3b5c,#ff1744);color:#fff;font-size:10px;font-weight:700;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 0 10px rgba(255,50,70,0.5);}
@media(min-width:431px){.app{border-left:1px solid rgba(40,100,180,0.1);border-right:1px solid rgba(40,100,180,0.1);}}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <button class="btn-back" onclick="history.back()">&#8249;</button>
    <span class="page-title" id="studentName">学生详情</span>
  </div>
  <div class="info-card">
    <div class="info-row"><span class="info-label">姓名</span><span class="info-value" id="dName">-</span></div>
    <div class="info-row"><span class="info-label">学号</span><span class="info-value" id="dNo">-</span></div>
    <div class="info-row"><span class="info-label">性别</span><span class="info-value" id="dGender">-</span></div>
    <div class="info-row"><span class="info-label">班级</span><span class="info-value" id="dClass">-</span></div>
    <div class="info-row"><span class="info-label">电话</span><span class="info-value" id="dPhone">-</span></div>
  </div>
  <div class="score-section">
    <div class="section-title">成绩记录</div>
    <div id="scoreList"></div>
  </div>
  <div class="bottom-tab">
    <a class="tab-item active" href="/班级组织首页.html">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none" opacity="0.3"><rect x="4" y="4" width="16" height="16" rx="4"/></svg></div>
      <span class="tab-label">班级组织</span>
    </a>
    <a class="tab-item" href="#"><span class="tab-badge">5</span>
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(120,150,190,0.4)" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      <span class="tab-label">工作台</span>
    </a>
    <a class="tab-item" href="#">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(120,150,190,0.4)" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-8 8-8s8 4 8 8"/></svg></div>
      <span class="tab-label">我的</span>
    </a>
  </div>
</div>
<script>
const students={
  '1':{name:'张明宇',no:'2024001',gender:'男',class:'高三1班',phone:'13800138001',scores:[{exam:'期中考试',subject:'数学',score:95},{exam:'期中考试',subject:'语文',score:88},{exam:'月考',subject:'英语',score:82}]},
  '2':{name:'李思雨',no:'2024002',gender:'女',class:'高三1班',phone:'13800138002',scores:[{exam:'期中考试',subject:'数学',score:78},{exam:'期中考试',subject:'语文',score:92},{exam:'月考',subject:'英语',score:85}]},
  '3':{name:'王浩然',no:'2024003',gender:'男',class:'高三1班',phone:'13800138003',scores:[{exam:'期中考试',subject:'数学',score:91},{exam:'期中考试',subject:'语文',score:76}]},
  '4':{name:'赵晓萌',no:'2024004',gender:'女',class:'高三1班',phone:'13800138004',scores:[{exam:'期中考试',subject:'数学',score:86},{exam:'月考',subject:'英语',score:72}]},
  '5':{name:'陈子轩',no:'2024005',gender:'男',class:'高三2班',phone:'13800138005',scores:[]},
  '6':{name:'刘佳琪',no:'2024006',gender:'女',class:'高三2班',phone:'13800138006',scores:[{exam:'期中考试',subject:'数学',score:88}]},
  '7':{name:'周博文',no:'2024007',gender:'男',class:'高三2班',phone:'13800138007',scores:[{exam:'期中考试',subject:'数学',score:65}]},
  '8':{name:'吴雨桐',no:'2024008',gender:'女',class:'高三2班',phone:'13800138008',scores:[]},
};
const params=new URLSearchParams(location.search);
const s=students[params.get('id')||'1']||students['1'];
document.getElementById('studentName').textContent=s.name;
document.getElementById('dName').textContent=s.name;
document.getElementById('dNo').textContent=s.no;
document.getElementById('dGender').textContent=s.gender;
document.getElementById('dClass').textContent=s.class;
document.getElementById('dPhone').textContent=s.phone;
const sl=document.getElementById('scoreList');
if(!s.scores.length){sl.innerHTML='<div class="empty">暂无成绩记录</div>';}else{
  sl.innerHTML=s.scores.map(sc=>`<div class="score-card"><div class="score-left"><span class="score-exam">${sc.exam} - ${sc.subject}</span><span class="score-meta">得分</span></div><span class="score-val${sc.score<60?' fail':''}">${sc.score}</span></div>`).join('');
}
</script>
</body>
</html>
