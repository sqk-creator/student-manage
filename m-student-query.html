<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学生查询</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080c18;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  -webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh;
}
.app{width:100%;max-width:430px;background:linear-gradient(180deg,#080c18 0%,#0d1326 100%);min-height:100vh;position:relative;}
.app::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(30,80,180,0.12) 0%,transparent 60%);pointer-events:none;}
.top-bar{display:flex;align-items:center;padding:12px 16px;position:relative;z-index:2;gap:12px;}
.btn-back{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;background:rgba(20,40,80,0.4);border:1px solid rgba(50,120,200,0.15);border-radius:50%;color:rgba(150,190,230,0.7);font-size:18px;cursor:pointer;}
.page-title{font-size:18px;font-weight:700;color:#dce6f8;}
.search-bar{padding:0 16px;margin-bottom:12px;position:relative;z-index:1;}
.search-input{width:100%;height:40px;background:rgba(14,24,52,0.8);border:1px solid rgba(50,120,200,0.15);border-radius:10px;padding:0 12px 0 36px;font-size:14px;color:#c8ddf8;outline:none;}
.search-input::placeholder{color:rgba(120,155,200,0.35);}
.search-input:focus{border-color:rgba(70,150,240,0.35);box-shadow:0 0 12px rgba(40,100,220,0.1);}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:rgba(120,160,210,0.4);}
.student-list{padding:0 16px 100px;position:relative;z-index:1;}
.student-card{background:linear-gradient(160deg,rgba(14,24,52,0.9),rgba(18,32,62,0.85));border:1px solid rgba(50,120,200,0.1);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;}
.student-card:active{border-color:rgba(70,150,240,0.25);}
.student-info{display:flex;flex-direction:column;gap:3px;}
.student-name{font-size:15px;font-weight:600;color:#dce6f8;}
.student-meta{font-size:11px;color:rgba(120,155,200,0.45);}
.student-arrow{color:rgba(100,140,200,0.35);font-size:16px;}
.empty{text-align:center;color:rgba(120,155,200,0.35);margin-top:80px;font-size:14px;}

.bottom-tab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(180deg,rgba(10,16,32,0.96),rgba(6,10,24,0.98));border-top:1px solid rgba(40,100,180,0.12);display:flex;justify-content:space-around;align-items:center;padding:8px 0 12px;backdrop-filter:blur(20px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.4);}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 20px;position:relative;text-decoration:none;}
.tab-icon svg{width:22px;height:22px;}
.tab-label{font-size:11px;font-weight:500;color:rgba(120,150,190,0.5);}
.tab-item.active .tab-label{color:#5ca0ff;}
.tab-item.active .tab-icon svg{stroke:#5ca0ff;fill:rgba(92,160,255,0.15);}
.tab-badge{position:absolute;top:-2px;right:10px;min-width:18px;height:18px;background:linear-gradient(135deg,#ff3b5c,#ff1744);color:#fff;font-size:10px;font-weight:700;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 0 10px rgba(255,50,70,0.5);}
@media(min-width:431px){.app{border-left:1px solid rgba(40,100,180,0.1);border-right:1px solid rgba(40,100,180,0.1);}}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <button class="btn-back" onclick="history.back()">&#8249;</button>
    <span class="page-title">学生查询</span>
  </div>
  <div class="search-bar">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </span>
    <input class="search-input" id="searchInput" placeholder="搜索学生姓名或学号" oninput="filterStudents()">
  </div>
  <div class="student-list" id="studentList"></div>
  <div class="bottom-tab">
    <a class="tab-item active" href="/班级组织首页.html">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none" opacity="0.3"><rect x="4" y="4" width="16" height="16" rx="4"/></svg></div>
      <span class="tab-label">班级组织</span>
    </a>
    <a class="tab-item" href="#">
      <span class="tab-badge">5</span>
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(120,150,190,0.4)" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      <span class="tab-label">工作台</span>
    </a>
    <a class="tab-item" href="#">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(120,150,190,0.4)" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-8 8-8s8 4 8 8"/></svg></div>
      <span class="tab-label">我的</span>
    </a>
  </div>
</div>
<script>
const students = [
  {id:1,name:'张明宇',student_no:'2024001',gender:'男',class:'高三1班',phone:'13800138001'},
  {id:2,name:'李思雨',student_no:'2024002',gender:'女',class:'高三1班',phone:'13800138002'},
  {id:3,name:'王浩然',student_no:'2024003',gender:'男',class:'高三1班',phone:'13800138003'},
  {id:4,name:'赵晓萌',student_no:'2024004',gender:'女',class:'高三1班',phone:'13800138004'},
  {id:5,name:'陈子轩',student_no:'2024005',gender:'男',class:'高三2班',phone:'13800138005'},
  {id:6,name:'刘佳琪',student_no:'2024006',gender:'女',class:'高三2班',phone:'13800138006'},
  {id:7,name:'周博文',student_no:'2024007',gender:'男',class:'高三2班',phone:'13800138007'},
  {id:8,name:'吴雨桐',student_no:'2024008',gender:'女',class:'高三2班',phone:'13800138008'},
];
function renderList(list){
  const el=document.getElementById('studentList');
  if(!list.length){el.innerHTML='<div class="empty">未找到匹配的学生</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="student-card" onclick="location.href='m-student-detail.html?id=${s.id}'">
      <div class="student-info">
        <span class="student-name">${s.name}</span>
        <span class="student-meta">学号: ${s.student_no} · ${s.class} · ${s.gender}</span>
      </div>
      <span class="student-arrow">&#8250;</span>
    </div>`).join('');
}
function filterStudents(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  renderList(students.filter(s=>s.name.includes(q)||s.student_no.includes(q)));
}
renderList(students);
</script>
</body>
</html>
