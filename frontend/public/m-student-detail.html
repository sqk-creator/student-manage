<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学生详情</title>
<link rel="stylesheet" href="mobile-header.css">
<style>
html{overflow-y:scroll;}

/* Header Title Row - photo top-aligned with name */
.header-title-row{align-items:flex-start;}

/* Header Card - full width white */
.header-card{
  background:#FFFFFF;padding:14px 16px 0;
}

/* Student Hero Left Column - name + info, photo on right */
.student-hero-left{flex:1;min-width:0;padding-right:16px;}

/* Student Info below name - 14px gap, narrower width */
.student-info{margin-top:14px;margin-left:10px;max-width:280px;}

/* Override nav title to match design */
.page-header.mode-nav .header-label{font-size:16px;font-weight:500;}
.info-left{flex:1;min-width:0;}
.info-grid-row{
  display:flex;gap:12px;margin-bottom:8px;
}
.info-field{flex:1;min-width:0;}
.info-field-label{font-size:12px;color:#86909C;margin-bottom:2px;}
.info-field-value{font-size:14px;color:#1D2129;font-weight:500;}

.info-right{flex-shrink:0;}
.info-photo{
  width:80px;height:106px;border-radius:10px;object-fit:cover;
  background:linear-gradient(135deg,#BEEFDA,#35B9AA);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;color:#fff;font-weight:700;
}

.expand-toggle{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:0 0 4px;cursor:pointer;
}
.expand-toggle-text{font-size:12px;color:#86909C;}
.expand-toggle-arrow{font-size:10px;color:#C0C4CC;transition:transform .2s;}
.expand-toggle.open .expand-toggle-arrow{transform:rotate(180deg);}

.info-extra{
  display:none;padding:10px 0 0;margin-top:8px;
  border-top:1px solid #F2F3F5;
}
.info-extra.show{display:block;}

/* Semester Tabs */
.semester-tabs-wrap{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  margin:0 -16px;
}
.semester-tabs-wrap::-webkit-scrollbar{display:none;}
.semester-tabs{
  display:flex;padding:0 16px;gap:4px;
}
.semester-tab{
  padding:10px 16px;text-align:center;
  font-size:14px;font-weight:400;cursor:pointer;
  border:none;background:transparent;
  color:#86909C;position:relative;
  white-space:nowrap;flex-shrink:0;
}
.semester-tab.active{color:#1D2129;font-weight:700;}
.semester-tab.active::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:20px;height:3px;border-radius:2px;
  background:#14A89A;
}

/* Academic Year Card */
.year-card{
  margin:10px 16px;
  background:#FFFFFF;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}
.year-card-header{
  display:flex;justify-content:center;align-items:center;
  margin-bottom:14px;
}
.year-label{font-size:12px;color:#86909C;}
.year-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:#F2F3F5;border-radius:13px;padding:4px 10px;
}
.year-value{font-size:14px;color:#1D2129;font-weight:500;}
.year-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.year-field{text-align:center;}
.year-field-label{font-size:12px;color:#86909C;margin-bottom:4px;}
.year-field-value{font-size:14px;color:#1D2129;font-weight:600;}

/* Score Section */
.info-section{
  margin:0 16px 10px;
  background:#FFFFFF;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}
.section-title{
  font-size:15px;font-weight:600;color:#1D2129;
  margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
}
.section-title::before{
  content:'';width:3px;height:15px;
  background:#14A89A;border-radius:2px;display:inline-block;
}
.score-summary{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-bottom:16px;
}
.score-item{
  background:#F7F8FA;border-radius:12px;
  padding:14px 10px;text-align:center;
}
.score-label{font-size:12px;color:#86909C;}
.score-value{font-size:22px;font-weight:700;color:#1D2129;margin-top:4px;}
.score-value.high{color:#14A89A;}

.exam-table{
  width:100%;border-collapse:collapse;
}
.exam-table th,.exam-table td{
  padding:10px 8px;text-align:left;font-size:14px;
}
.exam-table th{color:#86909C;font-weight:400;font-size:12px;border-bottom:1px solid #E5E6EB;}
.exam-table td{color:#1D2129;border-bottom:1px solid #F2F3F5;}
.exam-table tr:last-child td{border-bottom:none;}
.score-highlight{color:#14A89A;font-weight:600;}
.score-warn{color:#FF6A1A;font-weight:600;}

/* ===== Attendance Stats Card ===== */
.attendance-stats-card{
  margin:10px 16px;background:#FFFFFF;border-radius:14px;
  padding:16px;box-shadow:0 2px 6px rgba(0,0,0,0.04);
}
.asc-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;
}
.asc-title{font-size:20px;font-weight:600;color:#1D2129;}
.asc-month-wrap{position:relative;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.asc-month-label{font-size:12px;color:#86909C;}
.asc-month-arrow{font-size:10px;color:#86909C;transition:transform .2s;}
.asc-month-wrap.open .asc-month-arrow{transform:rotate(180deg);}
.asc-dropdown{
  display:none;position:absolute;top:28px;right:0;
  background:#FFFFFF;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:10;
  min-width:72px;max-height:220px;overflow-y:auto;padding:4px 0;
}
.asc-dropdown.show{display:block;}
.asc-dropdown-item{
  padding:8px 16px;font-size:13px;color:#1D2129;cursor:pointer;
}
.asc-dropdown-item:hover{background:#F2F3F5;}

.asc-body{
  display:flex;gap:16px;margin-bottom:14px;
}
.asc-stats-grid{
  flex:1;display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px 10px;
}
.asc-stat-item{text-align:center;}
.asc-stat-label{font-size:12px;color:#86909C;margin-bottom:4px;}
.asc-stat-value{display:flex;align-items:baseline;justify-content:center;gap:2px;}
.asc-stat-num{font-size:24px;font-weight:700;color:#1D2129;line-height:1.2;}
.asc-stat-unit{font-size:11px;color:#86909C;}

.asc-divider-v{
  width:1px;background:#E5E6EB;flex-shrink:0;
}

.asc-progress-group{
  display:flex;gap:20px;padding:0 6px;
}
.asc-progress-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.asc-progress-bar{
  width:12px;height:80px;background:#F2F3F5;border-radius:12px;
  overflow:hidden;position:relative;
}
.asc-progress-fill{
  position:absolute;bottom:0;left:0;right:0;
  background:#14A89A;border-radius:12px;
  transition:height .5s ease;
}
.asc-progress-label{font-size:11px;color:#86909C;}
.asc-progress-val{font-size:14px;font-weight:700;color:#1D2129;}

.asc-footer{
  display:flex;align-items:center;
  background:#F1F8F7;border-radius:10px;padding:10px 14px;
}
.asc-footer-left{display:flex;align-items:center;gap:8px;flex:1;}
.asc-check-icon{
  width:20px;height:20px;border-radius:50%;
  background:#1D2129;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
}
.asc-footer-status{font-size:14px;font-weight:500;color:#1D2129;}
.asc-footer-status.absent{color:#F53F3F;}
.asc-footer-divider{width:1px;height:16px;background:#C9CDD4;margin:0 16px;flex-shrink:0;}
.asc-footer-right{
  display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;
}
.asc-footer-link{font-size:14px;color:#1D2129;}
.asc-arrow-btn{
  width:24px;height:24px;border-radius:50%;
  background:#FFFFFF;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;color:#1D2129;
}
</style>
</head>
<body>
<div class="app">

  <!-- Header Card: nav + student info + semester tabs -->
  <div class="page-header mode-nav">
    <div class="header-top">
      <button class="back-btn" onclick="history.back()">
        <span class="back-arrow">&#8249;</span>
      </button>
      <span class="header-label">学生详情</span>
      <div class="capsule">
        <div class="capsule-dot"></div>
        <div class="capsule-line"></div>
        <div class="capsule-circle"></div>
      </div>
    </div>

    <div class="header-title-row">
      <div class="student-hero-left">
        <span class="page-title" id="headerTitle">-</span>
        <div class="student-info">
          <div class="info-left">
            <div class="info-grid-row">
              <div class="info-field">
                <div class="info-field-label">性别</div>
                <div class="info-field-value" id="heroGender">-</div>
              </div>
              <div class="info-field">
                <div class="info-field-label">学号</div>
                <div class="info-field-value" id="heroNo">-</div>
              </div>
              <div class="info-field">
                <div class="info-field-label">出生年月</div>
                <div class="info-field-value" id="heroBirth">-</div>
              </div>
            </div>
            <div class="info-grid-row">
              <div class="info-field">
                <div class="info-field-label">籍贯</div>
                <div class="info-field-value" id="heroHometown">-</div>
              </div>
              <div class="info-field">
                <div class="info-field-label">年龄</div>
                <div class="info-field-value" id="heroAge">-</div>
              </div>
              <div class="info-field"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="info-right">
        <div class="info-photo" id="heroAvatar"></div>
      </div>
    </div>

    <div class="expand-toggle" id="expandToggle" onclick="toggleExpand()">
      <span class="expand-toggle-text">查看更多信息</span>
      <span class="expand-toggle-arrow">&#9660;</span>
    </div>
    <div class="info-extra" id="heroExtra">
      <div class="info-grid-row">
        <div class="info-field">
          <div class="info-field-label">班级</div>
          <div class="info-field-value" id="infoClass">-</div>
        </div>
        <div class="info-field">
          <div class="info-field-label">联系电话</div>
          <div class="info-field-value" id="infoPhone">-</div>
        </div>
      </div>
      <div class="info-grid-row">
        <div class="info-field">
          <div class="info-field-label">班级职务</div>
          <div class="info-field-value" id="infoRole">-</div>
        </div>
        <div class="info-field"></div>
      </div>
      <div id="infoPhoto" style="display:none;margin-top:8px;">
        <span class="info-field-label" style="display:block;margin-bottom:4px;">照片</span>
        <img id="studentPhoto" src="" style="width:80px;height:100px;border-radius:10px;object-fit:cover;border:1px solid #E5E6EB;" alt="学生照片">
      </div>
    </div>

    <div class="semester-tabs-wrap">
      <div class="semester-tabs" id="semesterTabs">
        <button class="semester-tab active" onclick="switchSemester(0)">高三下学期</button>
        <button class="semester-tab" onclick="switchSemester(1)">高三上学期</button>
        <button class="semester-tab" onclick="switchSemester(2)">高二下学期</button>
        <button class="semester-tab" onclick="switchSemester(3)">高二上学期</button>
      </div>
    </div>
  </div>

  <!-- Academic Year Card -->
  <div class="year-card">
    <div class="year-card-header">
      <span class="year-tag"><span class="year-label">学年</span><span class="year-value" id="yearRange">2025.02–2025.06</span></span>
    </div>
    <div class="year-grid">
      <div class="year-field">
        <div class="year-field-label">班级</div>
        <div class="year-field-value" id="yearClass">-</div>
      </div>
      <div class="year-field">
        <div class="year-field-label">班级职务</div>
        <div class="year-field-value" id="yearRole">-</div>
      </div>
      <div class="year-field">
        <div class="year-field-label">其他职务</div>
        <div class="year-field-value">-</div>
      </div>
      <div class="year-field">
        <div class="year-field-label">宿舍情况</div>
        <div class="year-field-value">-</div>
      </div>
    </div>
  </div>

  <!-- Score Section -->
  <div class="info-section">
    <div class="section-title">成绩记录</div>
    <div class="score-summary">
      <div class="score-item">
        <span class="score-label">考试次数</span>
        <span class="score-value" id="examCount">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">平均分</span>
        <span class="score-value high" id="avgTotal">-</span>
      </div>
      <div class="score-item">
        <span class="score-label">最近成绩</span>
        <span class="score-value" id="lastTotal">-</span>
      </div>
    </div>
    <div style="overflow-x:auto;" id="examTableContainer">
      <table class="exam-table">
        <thead><tr><th>考试</th><th>语文</th><th>数学</th><th>英语</th></tr></thead>
        <tbody id="examTbody"><tr><td colspan="4" style="text-align:center;color:#86909C;font-size:14px;">暂无成绩记录</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Attendance Stats Card -->
  <div class="attendance-stats-card" id="attendanceStatsCard" style="display:none;">
    <div class="asc-header">
      <span class="asc-title">学生考勤情况</span>
      <div class="asc-month-wrap" id="ascMonthToggle" onclick="toggleMonthDropdown()">
        <span class="asc-month-label" id="ascMonthLabel">本月</span>
        <span class="asc-month-arrow">&#9660;</span>
        <div class="asc-dropdown" id="ascDropdown">
          <div class="asc-dropdown-item" onclick="selectMonth(null)">本月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(1)">1月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(2)">2月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(3)">3月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(4)">4月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(5)">5月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(6)">6月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(7)">7月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(8)">8月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(9)">9月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(10)">10月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(11)">11月</div>
          <div class="asc-dropdown-item" onclick="selectMonth(12)">12月</div>
        </div>
      </div>
    </div>

    <div class="asc-body">
      <div class="asc-stats-grid" id="ascStatsGrid">
        <div class="asc-stat-item">
          <div class="asc-stat-label">应出勤</div>
          <div class="asc-stat-value"><span class="asc-stat-num" id="ascShould">0</span><span class="asc-stat-unit">次</span></div>
        </div>
        <div class="asc-stat-item">
          <div class="asc-stat-label">实出勤</div>
          <div class="asc-stat-value"><span class="asc-stat-num" id="ascActual">0</span><span class="asc-stat-unit">次</span></div>
        </div>
        <div class="asc-stat-item">
          <div class="asc-stat-label">实出操</div>
          <div class="asc-stat-value"><span class="asc-stat-num" id="ascExercise">0</span><span class="asc-stat-unit">次</span></div>
        </div>
        <div class="asc-stat-item">
          <div class="asc-stat-label">请假</div>
          <div class="asc-stat-value"><span class="asc-stat-num" id="ascLeave">0</span><span class="asc-stat-unit">次</span></div>
        </div>
        <div class="asc-stat-item">
          <div class="asc-stat-label">迟到</div>
          <div class="asc-stat-value"><span class="asc-stat-num" id="ascLate">0</span><span class="asc-stat-unit">次</span></div>
        </div>
        <div class="asc-stat-item">
          <div class="asc-stat-label">缺勤</div>
          <div class="asc-stat-value"><span class="asc-stat-num" id="ascAbsence">0</span><span class="asc-stat-unit">次</span></div>
        </div>
      </div>

      <div class="asc-divider-v"></div>

      <div class="asc-progress-group">
        <div class="asc-progress-item">
          <div class="asc-progress-bar"><div class="asc-progress-fill" id="ascRateBar" style="height:0%"></div></div>
          <div class="asc-progress-label">出勤率</div>
          <div class="asc-progress-val" id="ascRateVal">0%</div>
        </div>
        <div class="asc-progress-item">
          <div class="asc-progress-bar"><div class="asc-progress-fill" id="ascExBar" style="height:0%"></div></div>
          <div class="asc-progress-label">出操率</div>
          <div class="asc-progress-val" id="ascExVal">0%</div>
        </div>
      </div>
    </div>

    <div class="asc-footer">
      <div class="asc-footer-left">
        <span class="asc-check-icon" id="ascCheckIcon" style="display:none;">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span class="asc-footer-status" id="ascTodayStatus">今日暂未出勤</span>
      </div>
      <div class="asc-footer-divider"></div>
      <div class="asc-footer-right" onclick="goAttendanceDetail()">
        <span class="asc-footer-link">考勤详情</span>
        <span class="asc-arrow-btn">&#8250;</span>
      </div>
    </div>
  </div>

</div>

<script>
const urlParams=new URLSearchParams(window.location.search);
const studentId=urlParams.get('id')||1;
var currentSemester=0;

function toggleExpand(){
  var toggle=document.getElementById('expandToggle');
  var extra=document.getElementById('heroExtra');
  toggle.classList.toggle('open');
  extra.classList.toggle('show');
}

function switchSemester(idx){
  currentSemester=idx;
  var tabs=document.querySelectorAll('.semester-tab');
  for(var i=0;i<tabs.length;i++){
    tabs[i].className='semester-tab'+(i===idx?' active':'');
  }
  updateYearCard();
}

function updateYearCard(){
  var ranges=['2025.02–2025.06','2024.09–2025.01','2024.02–2024.06','2023.09–2024.01'];
  document.getElementById('yearRange').textContent=ranges[currentSemester]||'--';
}

async function loadStudent(){
  try{
    const res=await fetch('/api/public/students/'+studentId);
    const data=await res.json();
    const s=data.data||data;
    var initialName=s.name||'-';

    // Set page title to student name
    document.getElementById('headerTitle').textContent=initialName;

    var photoDiv=document.getElementById('heroAvatar');
    if(s.photo){
      photoDiv.innerHTML='<img src="'+s.photo+'" style="width:80px;height:106px;border-radius:10px;object-fit:cover;">';
    }else{
      photoDiv.textContent=initialName[0];
    }

    document.getElementById('heroGender').textContent=s.gender||'-';
    document.getElementById('heroBirth').textContent=s.birth_date||'-';
    document.getElementById('heroNo').textContent=s.student_no||'-';
    document.getElementById('heroHometown').textContent=s.hometown||'-';

    if(s.birth_date){
      var birthYear=parseInt(s.birth_date.substring(0,4));
      var now=new Date().getFullYear();
      document.getElementById('heroAge').textContent=(now-birthYear)+'岁';
    }

    document.getElementById('infoClass').textContent=s.class_name||'-';
    document.getElementById('infoPhone').textContent=s.phone||'-';
    document.getElementById('infoRole').textContent=s.class_role||'-';
    document.getElementById('yearClass').textContent=s.class_name||'-';
    document.getElementById('yearRole').textContent=s.class_role||'-';

    if(s.photo){
      document.getElementById('infoPhoto').style.display='block';
      document.getElementById('studentPhoto').src=s.photo;
    }
  }catch(e){}
}

async function loadScores(){
  try{
    const res=await fetch('/api/public/scores?student_id='+studentId);
    const data=await res.json();
    const scores=data.data||data||[];
    document.getElementById('examCount').textContent=scores.length;

    if(scores.length===0){
      document.getElementById('avgTotal').textContent='-';
      document.getElementById('lastTotal').textContent='-';
      return;
    }

    let sumTotal=0;
    scores.forEach(sc=>{
      const subjects=['chinese','math','english','physics','chemistry','biology','politics','history','geography'];
      let total=0;
      subjects.forEach(s=>total+=(sc[s]||0));
      sc._total=total;
      sumTotal+=total;
    });
    document.getElementById('avgTotal').textContent=Math.round(sumTotal/scores.length);
    document.getElementById('lastTotal').textContent=scores[0]._total;

    const tbody=document.getElementById('examTbody');
    tbody.innerHTML=scores.slice(0,10).map(sc=>{
      const highlight=(val)=>(val>=135?' score-highlight':(val<72?' score-warn':''));
      return '<tr><td>'+(sc.exam_name||sc.exam_id)+'</td>'
        +'<td class="'+highlight(sc.chinese||0)+'">'+(sc.chinese||'-')+'</td>'
        +'<td class="'+highlight(sc.math||0)+'">'+(sc.math||'-')+'</td>'
        +'<td class="'+highlight(sc.english||0)+'">'+(sc.english||'-')+'</td></tr>';
    }).join('');
  }catch(e){}
}

var ascMonth=null;

function toggleMonthDropdown(){
  var wrap=document.getElementById('ascMonthToggle');
  var dd=document.getElementById('ascDropdown');
  wrap.classList.toggle('open');
  dd.classList.toggle('show');
}

function selectMonth(m){
  var wrap=document.getElementById('ascMonthToggle');
  var dd=document.getElementById('ascDropdown');
  wrap.classList.remove('open');
  dd.classList.remove('show');

  var now=new Date();
  if(m===null){
    ascMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    document.getElementById('ascMonthLabel').textContent='本月';
  }else{
    ascMonth=now.getFullYear()+'-'+String(m).padStart(2,'0');
    document.getElementById('ascMonthLabel').textContent=m+'月';
  }
  loadAttendanceStats();
}

async function loadAttendanceStats(){
  var url='/api/public/students/'+studentId+'/attendance-stats';
  if(ascMonth) url+='?month='+ascMonth;
  try{
    var res=await fetch(url);
    var data=await res.json();
    var card=document.getElementById('attendanceStatsCard');
    card.style.display='block';

    document.getElementById('ascShould').textContent=data.should_attend;
    document.getElementById('ascActual').textContent=data.actual_attend;
    document.getElementById('ascExercise').textContent=data.actual_exercise;
    document.getElementById('ascLeave').textContent=data.leave_count;
    document.getElementById('ascLate').textContent=data.late_count;
    document.getElementById('ascAbsence').textContent=data.absence_count;

    document.getElementById('ascRateBar').style.height=data.attendance_rate+'%';
    document.getElementById('ascRateVal').textContent=data.attendance_rate+'%';
    document.getElementById('ascExBar').style.height=data.exercise_rate+'%';
    document.getElementById('ascExVal').textContent=data.exercise_rate+'%';

    var statusEl=document.getElementById('ascTodayStatus');
    var checkEl=document.getElementById('ascCheckIcon');
    statusEl.textContent=data.today_status;
    statusEl.className='asc-footer-status';
    if(data.today_status==='今日已出勤'){
      checkEl.style.display='flex';
    }else{
      checkEl.style.display='none';
      if(data.today_status==='今日缺勤'){
        statusEl.className='asc-footer-status absent';
      }
    }
  }catch(e){}
}

function goAttendanceDetail(){
  window.location.href='/m-attendance.html?id='+studentId;
}

document.addEventListener('click',function(e){
  var wrap=document.getElementById('ascMonthToggle');
  var dd=document.getElementById('ascDropdown');
  if(!wrap.contains(e.target)){
    wrap.classList.remove('open');
    dd.classList.remove('show');
  }
});

loadStudent();
loadScores();
loadAttendanceStats();
</script>
